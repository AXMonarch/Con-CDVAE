<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAE Feature Database — MP20 Crystal Embeddings</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2126;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaed;
    --text2: #8b909a;
    --text3: #555b66;
    --accent: #5b8fff;
    --accent2: #2d5adb;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;

    --c-blue: #3b82f6;
    --c-teal: #14b8a6;
    --c-amber: #f59e0b;
    --c-coral: #f97316;
    --c-purple: #8b5cf6;
    --c-green: #22c55e;
    --c-pink: #ec4899;
    --c-gray: #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: var(--mono);
    font-size: 1.05rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .header-left p {
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }

  .header-stats {
    display: flex;
    gap: 2rem;
  }

  .stat {
    text-align: right;
  }

  .stat-val {
    font-family: var(--mono);
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .controls {
    padding: 1.25rem 2.5rem;
    display: flex;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 420px;
  }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px 8px 34px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder { color: var(--text3); }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .filter-btn:hover { border-color: var(--border2); background: var(--surface2); color: var(--text); }
  .filter-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    cursor: pointer;
  }

  .sort-select:focus { border-color: var(--accent); }

  .results-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-left: auto;
    white-space: nowrap;
  }

  main {
    padding: 1.5rem 2.5rem 4rem;
  }

  .cluster-section { margin-bottom: 2.5rem; }

  .cluster-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .cluster-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cluster-name {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    font-weight: 500;
  }

  .cluster-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-left: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 6px 10px;
    text-align: left;
    font-weight: 400;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  th:hover { color: var(--text2); }

  th.sorted { color: var(--accent); }

  th.r { text-align: right; }

  td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: var(--surface2); }

  .td-id {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
  }

  .td-label {
    font-size: 13px;
    color: var(--text);
    font-weight: 400;
    max-width: 260px;
  }

  .td-cluster {
    white-space: nowrap;
  }

  .cluster-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid;
    white-space: nowrap;
  }

  .td-firerate {
    font-family: var(--mono);
    font-size: 12px;
    text-align: right;
    white-space: nowrap;
  }

  .td-formation {
    font-family: var(--mono);
    font-size: 12px;
    text-align: right;
    white-space: nowrap;
  }

  .pos { color: #f97316; }
  .neg { color: #22c55e; }

  .td-elements {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
  }

  .bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-end;
  }

  .bar-bg {
    width: 60px;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent2);
  }

  .no-results {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 13px;
  }

  .highlight {
    background: rgba(91, 143, 255, 0.25);
    border-radius: 2px;
    padding: 0 1px;
  }

  @media (max-width: 768px) {
    header { padding: 1.5rem; }
    .controls { padding: 1rem 1.5rem; }
    main { padding: 1rem 1.5rem 3rem; }
    .td-elements { display: none; }
    .header-stats { display: none; }
  }
</style>
</head>

<header>
  <div class="header-left">

    <p>MP20 Crystal Structure Embeddings &mdash; Sparse Autoencoder</p>

  <div class="header-stats">

    <div class="stat">

  </div>
</header>

<div class="controls">

    <span class="search-icon">&#8981;</span>
    <input type="text" id="search" placeholder="Search ID, label, element..." autocomplete="off" />
  </div>
  <div class="filter-group" id="cluster-filters"></div>
  <select class="sort-select" id="sort-select">
    <option value="cluster">Sort: cluster</option>

    <option value="formation-asc">Sort: E_f most neg.</option>

  </select>
  <span class="results-info" id="results-info">100 / 100</span>
</div>

<main id="main"></main>

const MAX_FIRERATE = Math.max(...DATA.map(d => d.firerate));

let activeCluster = null;
let sortMode = 'cluster';
let searchQuery = '';

function clusterStyle(name) {
  const c = CLUSTERS[name] || { color: '#6b7280' };
  return { color: c.color };
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark class="highlight">$1</mark>');
}

function getSorted(data) {
  const d = [...data];
  if (sortMode === 'id') return d.sort((a,b) => a.id - b.id);
  if (sortMode === 'firerate-desc') return d.sort((a,b) => b.firerate - a.firerate);
  if (sortMode === 'firerate-asc') return d.sort((a,b) => a.firerate - b.firerate);
  if (sortMode === 'formation-asc') return d.sort((a,b) => a.formation - b.formation);
  if (sortMode === 'formation-desc') return d.sort((a,b) => b.formation - a.formation);
  return d.sort((a,b) => a.cluster.localeCompare(b.cluster) || a.id - b.id);
}

function render() {
  const q = searchQuery.toLowerCase().trim();

  let filtered = DATA.filter(d => {
    const matchCluster = !activeCluster || d.cluster === activeCluster;
    const matchSearch = !q ||
      d.id.toString().includes(q) ||
      d.label.toLowerCase().includes(q) ||
      d.cluster.toLowerCase().includes(q) ||
      d.elements.toLowerCase().includes(q);
    return matchCluster && matchSearch;
  });

  document.getElementById('results-info').textContent = `${filtered.length} / ${DATA.length}`;

  const main = document.getElementById('main');

  if (!filtered.length) {
    main.innerHTML = '<div class="no-results">no features match your query</div>';
    return;
  }

  const sorted = getSorted(filtered);

  if (sortMode === 'cluster') {
    const byCluster = {};
    sorted.forEach(d => {
      if (!byCluster[d.cluster]) byCluster[d.cluster] = [];
      byCluster[d.cluster].push(d);
    });

    let html = '';
    for (const [cname, items] of Object.entries(byCluster)) {
      const col = (CLUSTERS[cname] || { color: '#6b7280' }).color;
      html += `<div class="cluster-section">
        <div class="cluster-header">
          <div class="cluster-dot" style="background:${col}"></div>
          <span class="cluster-name">${cname}</span>
          <span class="cluster-count">${items.length} feature${items.length !== 1 ? 's' : ''}</span>
        </div>
        ${renderTable(items, q)}
      </div>`;
    }
    main.innerHTML = html;
  } else {
    main.innerHTML = renderTable(sorted, q);
  }
}

function renderTable(items, q) {
  return `<table>
    <thead>
      <tr>
        <th style="width:80px">ID</th>
        <th>Label</th>
        <th style="width:180px">Cluster</th>
        <th class="r" style="width:110px">Fire rate</th>
        <th class="r" style="width:90px">E_f (eV)</th>
        <th style="width:160px">Top elements</th>
      </tr>
    </thead>
    <tbody>
      ${items.map(d => {
        const col = (CLUSTERS[d.cluster] || { color: '#6b7280' }).color;
        const sign = d.formation >= 0 ? '+' : '';
        const fclass = d.formation < 0 ? 'neg' : 'pos';
        const barW = Math.round((d.firerate / MAX_FIRERATE) * 100);
        return `<tr>
          <td class="td-id">#${d.id}</td>
          <td class="td-label">${highlight(d.label, q)}</td>
          <td class="td-cluster">
            <span class="cluster-pill" style="color:${col};border-color:${col}22;background:${col}11">
              <span style="width:5px;height:5px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0"></span>
              ${highlight(d.cluster, q)}
            </span>
          </td>
          <td class="td-firerate">
            <div class="bar-wrap">
              <span>${d.firerate.toFixed(1)}%</span>
              <div class="bar-bg"><div class="bar-fill" style="width:${barW}%"></div></div>
            </div>
          </td>
          <td class="td-formation ${fclass}">${sign}${d.formation.toFixed(3)}</td>
          <td class="td-elements">${highlight(d.elements, q)}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

function buildFilters() {
  const wrap = document.getElementById('cluster-filters');
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'All';
  allBtn.dataset.cluster = '';
  wrap.appendChild(allBtn);

  const clusterNames = [...new Set(DATA.map(d => d.cluster))].sort();
  clusterNames.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = name;
    btn.dataset.cluster = name;
    const col = (CLUSTERS[name] || { color: '#6b7280' }).color;
    btn.addEventListener('mouseenter', () => { if (!btn.classList.contains('active')) btn.style.borderColor = col; });
    btn.addEventListener('mouseleave', () => { if (!btn.classList.contains('active')) btn.style.borderColor = ''; });
    wrap.appendChild(btn);
  });

  wrap.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    wrap.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active'); b.style.borderColor = ''; b.style.color = ''; });
    btn.classList.add('active');
    activeCluster = btn.dataset.cluster || null;
    if (activeCluster) {
      const col = (CLUSTERS[activeCluster] || { color: '#6b7280' }).color;
      btn.style.borderColor = col;
      btn.style.color = col;
    }
    render();
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

document.getElementById('sort-select').addEventListener('change', e => {
  sortMode = e.target.value;
  render();
});

buildFilters();
render();
</script>
